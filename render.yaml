services:
  - type: web
    name: visual-inspection-api
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: visual-inspection-db
          property: connectionString
      - key: REDIS_URL
        value: redis://localhost:6379/0
      - key: CACHE_TTL
        value: 86400
      - key: MAX_FILE_SIZE_MB
        value: 5
      - key: ALLOWED_EXTENSIONS
        value: jpg,jpeg,png,webp

databases:
  - name: visual-inspection-db
    plan: free
    databaseName: visual_inspection
    user: postgres
