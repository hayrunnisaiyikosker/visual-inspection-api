name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        pip install fastapi pydantic pydantic-settings httpx pytest pytest-asyncio

    - name: Run basic import test
      run: |
        python3 -c "from app.core.config import Settings; print("Config OK")"
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test
        REDIS_URL: redis://localhost:6379/0

    - name: Check health endpoint structure
      run: |
        python3 -c "
        from fastapi.testclient import TestClient
        import sys, os
        sys.path.insert(0, ".")
        os.environ["DATABASE_URL"] = "postgresql+asyncpg://postgres:postgres@localhost:5432/test"
        os.environ["REDIS_URL"] = "redis://localhost:6379/0"
        print("Import check passed")
        "
