name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        pip install fastapi pydantic pydantic-settings

    - name: Run basic import test
      run: |
        python3 -c "import fastapi; import pydantic; print("Dependencies OK")"

    - name: Check project structure
      run: |
        test -f app/main.py && echo "main.py OK"
        test -f app/api/routes/analyze.py && echo "analyze.py OK"
        test -f Dockerfile && echo "Dockerfile OK"
        test -f docker-compose.yml && echo "docker-compose.yml OK"
        echo "All structure checks passed"
